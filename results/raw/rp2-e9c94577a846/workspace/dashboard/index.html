<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AuditLens Acme Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #1f2933;
      background: #f7f8fa;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px;
    }
    header, section {
      border: 1px solid #d8dde6;
      background: #ffffff;
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 16px;
    }
    h1, h2 {
      margin: 0 0 12px;
    }
    dl {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 0;
    }
    dt {
      font-size: 12px;
      text-transform: uppercase;
      color: #52606d;
    }
    dd {
      margin: 4px 0 0;
      font-size: 24px;
      font-weight: 700;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>AuditLens Acme Dashboard</h1>
      <p>Local dashboard generated from staged synthetic evidence.</p>
    </header>
    <section>
      <h2>Evidence Summary</h2>
      <dl>
        <div><dt>Policies</dt><dd>13</dd></div>
        <div><dt>Reports</dt><dd>12</dd></div>
      </dl>
    </section>
    <section>
      <h2>Auditor Notes</h2>
      <p>Dashboard evidence covers access control, vendor management, change management, endpoint security, and training controls.</p>
    </section>

  </main>
</body>
</html>
