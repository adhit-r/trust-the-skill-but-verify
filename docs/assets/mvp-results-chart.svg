<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500" role="img" aria-labelledby="title desc">
  <title id="title">MVP results chart</title>
  <desc id="desc">Bar chart showing runtime-drift claims and pairwise disagreements across five controlled case families.</desc>
  <style>
    .title { font: 700 24px Arial, sans-serif; fill: #111827; }
    .subtitle { font: 13px Arial, sans-serif; fill: #374151; }
    .axis { stroke: #6b7280; stroke-width: 1.2; }
    .grid { stroke: #e5e7eb; stroke-width: 1; }
    .label { font: 13px Arial, sans-serif; fill: #111827; }
    .small { font: 12px Arial, sans-serif; fill: #374151; }
    .drift { fill: #0f766e; }
    .pair { fill: #2563eb; }
    .note { fill: #f9fafb; stroke: #d1d5db; rx: 8; }
  </style>

  <rect x="0" y="0" width="1100" height="500" fill="#ffffff"/>
  <text x="44" y="48" class="title">Current MVP Result Shape</text>
  <text x="44" y="74" class="subtitle">Five controlled case families, five runtime-drift claims, and thirty-six pairwise disagreements.</text>

  <line x1="110" y1="360" x2="1020" y2="360" class="axis"/>
  <line x1="110" y1="120" x2="110" y2="360" class="axis"/>
  <line x1="110" y1="300" x2="1020" y2="300" class="grid"/>
  <line x1="110" y1="240" x2="1020" y2="240" class="grid"/>
  <line x1="110" y1="180" x2="1020" y2="180" class="grid"/>
  <line x1="110" y1="120" x2="1020" y2="120" class="grid"/>

  <text x="74" y="365" class="small">0</text>
  <text x="74" y="305" class="small">3</text>
  <text x="74" y="245" class="small">6</text>
  <text x="68" y="185" class="small">9</text>
  <text x="62" y="125" class="small">12</text>

  <rect x="178" y="340" width="34" height="20" class="drift"/>
  <rect x="218" y="240" width="34" height="120" class="pair"/>
  <text x="164" y="386" class="label">Repo-audit</text>
  <text x="188" y="334" class="small">1</text>
  <text x="228" y="234" class="small">6</text>

  <rect x="342" y="340" width="34" height="20" class="drift"/>
  <rect x="382" y="300" width="34" height="60" class="pair"/>
  <text x="312" y="386" class="label">Network-egress</text>
  <text x="352" y="334" class="small">1</text>
  <text x="392" y="294" class="small">3</text>

  <rect x="506" y="340" width="34" height="20" class="drift"/>
  <rect x="546" y="220" width="34" height="140" class="pair"/>
  <text x="504" y="386" class="label">AuditLens</text>
  <text x="516" y="334" class="small">1</text>
  <text x="556" y="214" class="small">7</text>

  <rect x="670" y="320" width="34" height="40" class="drift"/>
  <rect x="710" y="200" width="34" height="160" class="pair"/>
  <text x="676" y="386" class="label">docs-forge</text>
  <text x="680" y="314" class="small">2</text>
  <text x="720" y="194" class="small">8</text>

  <rect x="834" y="360" width="34" height="0" class="drift"/>
  <rect x="874" y="120" width="34" height="240" class="pair"/>
  <text x="820" y="386" class="label">MCP/tool workflow</text>
  <text x="844" y="348" class="small">0</text>
  <text x="884" y="114" class="small">12</text>

  <rect x="760" y="428" width="18" height="18" class="drift"/>
  <text x="786" y="442" class="small">Runtime-drift claims</text>
  <rect x="908" y="428" width="18" height="18" class="pair"/>
  <text x="934" y="442" class="small">Pairwise disagreements</text>

  <rect x="44" y="416" width="590" height="42" class="note"/>
  <text x="64" y="443" class="small">MCP/tool workflow records controlled semantic-event disagreements; it is not a live MCP-server claim.</text>
</svg>
